{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Emitir Nota de Débito de Compra</h2>
    <form method="post">
        <div class="mb-3">
            <label class="form-label">Compra Asociada</label>
            <input type="text" class="form-control" value="{{ compra.numero_compra }}" readonly>
        </div>
        <div class="mb-3">
            <label class="form-label">Proveedor</label>
            <input type="text" class="form-control" value="{{ compra.proveedor.razon_social }}" readonly>
        </div>
        <div class="mb-3">
            <label class="form-label">Tipo *</label>
            <select class="form-select" name="tipo" required>
                <option value="flete">Flete</option>
                <option value="interes">Intereses por mora</option>
                <option value="recargo">Recargo</option>
                <option value="otro">Otro</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Motivo *</label>
            <input type="text" class="form-control" name="motivo" required maxlength="200">
        </div>
        <div class="mb-3">
            <label class="form-label">Monto (Gs) *</label>
            <input type="text" class="form-control" name="monto" required>
            <small class="text-muted">Este monto incrementará el saldo de la Cuenta por Pagar asociada a esta compra.</small>
        </div>
        <button type="submit" class="btn btn-primary">Emitir Nota de Débito</button>
        <a href="{{ url_for('compras.ver', id=compra.id) }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
