{% extends "base.html" %}

{% block title %}Crear Pedido de Compra{% endblock %}
{% block page_title %}Nuevo Pedido de Compra{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-10 mx-auto">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-shopping-basket"></i> Crear pedido para proveedor</span>
                <a href="{{ url_for('compras.pedidos') }}" class="btn btn-sm btn-outline-light">
                    <i class="fas fa-arrow-left"></i> Volver
                </a>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Proveedor</label>
                            <select name="proveedor_id" class="form-select" required>
                                <option value="">Seleccione un proveedor</option>
                                {% for proveedor in proveedores %}
                                <option value="{{ proveedor.id }}">{{ proveedor.razon_social }} - {{ proveedor.ruc }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fecha de entrega estimada</label>
                            <input type="date" name="fecha_entrega_estimada" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observaciones</label>
                            <textarea name="observaciones" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Productos solicitados</label>
                            <div class="border rounded p-3 bg-light">
                                <div class="row g-2 align-items-end">
                                    <div class="col-md-7">
                                        <select id="producto_id" class="form-select">
                                            <option value="">Seleccione producto</option>
                                            {% for producto in productos %}
                                            <option value="{{ producto.id }}">{{ producto.codigo }} - {{ producto.nombre }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <input type="number" id="cantidad_solicitada" class="form-control" min="1" step="1" placeholder="Cantidad">
                                    </div>
                                    <div class="col-md-2">
                                        <button type="button" class="btn btn-outline-primary w-100" onclick="agregarProducto()">
                                            <i class="fas fa-plus"></i> Agregar
                                        </button>
                                    </div>
                                </div>
                                <div class="mt-3">
                                    <table class="table table-sm mb-0" id="tablaProductos">
                                        <thead>
                                            <tr>
                                                <th>Producto</th>
                                                <th>Cantidad</th>
                                                <th></th>
                                            </tr>
                                        </thead>
                                        <tbody></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <input type="hidden" id="detalles_json" name="detalles_json" value="[]">
                    <div class="mt-4 d-flex justify-content-between">
                        <a href="{{ url_for('compras.pedidos') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Pedido
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
let detalles = [];
function agregarProducto() {
    const productoSelect = document.getElementById('producto_id');
    const cantidadInput = document.getElementById('cantidad_solicitada');
    const productoId = productoSelect.value;
    const cantidad = cantidadInput.value;
    if (!productoId || !cantidad) {
        alert('Seleccione un producto y una cantidad válida');
        return;
    }
    const productoText = productoSelect.options[productoSelect.selectedIndex].text;
    detalles.push({ producto_id: productoId, cantidad: cantidad, producto_text: productoText });
    renderDetalles();
    productoSelect.value = '';
    cantidadInput.value = '';
}
function renderDetalles() {
    const tbody = document.querySelector('#tablaProductos tbody');
    tbody.innerHTML = '';
    detalles.forEach((det, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${det.producto_text}</td><td>${det.cantidad}</td><td><button type="button" class="btn btn-sm btn-outline-danger" onclick="eliminarDetalle(${index})"><i class="fas fa-trash"></i></button></td>`;
        tbody.appendChild(row);
    });
    document.getElementById('detalles_json').value = JSON.stringify(detalles.map(({producto_id, cantidad}) => ({producto_id: parseInt(producto_id), cantidad: parseFloat(cantidad)})));
}
function eliminarDetalle(index) {
    detalles.splice(index, 1);
    renderDetalles();
}
</script>
{% endblock %}
